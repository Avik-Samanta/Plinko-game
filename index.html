<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canvas Game</title>
    <style>
        canvas{
            background-color: "#000";
        }
        #add-ball {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: "#0f0";
            padding: 10px;
            cursor: pointer;
        }
    </style>
  </head>


  <body>
    <canvas id="gameCanvas" width="800" height="800"></canvas>
    <div id="add-ball">Add Ball</div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const  DECIMAL_MULTIPLIER =  10000;

        const WIDTH = 800;
        const HEIGHT = 800;
        const ballRadius = 7;
        const obstacle_radius = 4;
        const gravity = pad(0.2);
        const horizontalFriction = 0.4;
        const verticalFriction = 0.8;
        let balls = [];

        const obstacle = [];
        const sinks = [];

        function pad(n){
            return n * DECIMAL_MULTIPLIER;
        }

        function unpad(n){
            return Math.floor(n/DECIMAL_MULTIPLIER);
        }

        // crate obstacle in pyramid shape 
        const rows = 16;
        for(let row = 0; row < rows; row++){
            const obstacle = row + 1;
            const y = 0 + row * 35;
            const spacing = 36;
            for(let col = 0; col < obstacle; col++){
                const x = WIDTH/2 - spacing * (row / 2 - col);
                obstacle.push({x: pad(x), y: pad(y), radius: obstacle_radius});
            }
        }

        // create sink at the bottom as rectangle
        const sinkWidth = 36;
        const NUM_SINKS = 15;
        const y = HEIGHT - 240;
        const width = sinkWidth;
        const height = sinkWidth;
        for(let i = 0; i < NUM_SINKS; i++){
            const x = WIDTH / 2 + (i - 7.5) * sinkWidth + obstacle_radius;
            sinks.push({x, y, width, height});
        }

    </script>
  </body>
</html>
